[project]
name = "admin-api"
version = "0.1.0"
description = "Admin API for managing sites, rules, and jobs"
requires-python = ">=3.12"
dependencies = [
    "core",
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "python-multipart>=0.0.9",
    "pyyaml>=6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/admin_api"]
