[project]
name = "collector"
version = "0.1.0"
description = "Web crawler and parser for hospital/doctor data"
requires-python = ">=3.12"
dependencies = [
    "core",
    "httpx>=0.27.0",
    "playwright>=1.40.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.0.0",
    "parsel>=1.8.0",
    "tenacity>=8.0.0",
    "anyio>=4.0.0",
    "pyyaml>=6.0.0",
    "jsonschema>=4.20.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/collector"]
