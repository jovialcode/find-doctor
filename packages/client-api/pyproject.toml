[project]
name = "client-api"
version = "0.1.0"
description = "Client API for querying doctors and hospitals"
requires-python = ">=3.12"
dependencies = [
    "core",
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "redis>=5.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/client_api"]
