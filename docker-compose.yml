services:
  # Infrastructure Services
  postgres:
    image: postgres:16-alpine
    container_name: find-doctor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: find-doctor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - find-doctor-network

  redis:
    image: redis:7-alpine
    container_name: find-doctor-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - find-doctor-network

  minio:
    image: minio/minio:latest
    container_name: find-doctor-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - find-doctor-network

  # API Services
  admin-api:
    build:
      context: .
      dockerfile: infra/docker/admin-api.Dockerfile
    container_name: find-doctor-admin-api
    environment:
      ENV: development
      DEBUG: "false"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/find-doctor
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: db+postgresql://postgres:postgres@postgres:5432/find-doctor
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: find-doctor
    ports:
      - "8500:8500"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - find-doctor-network

  client-api:
    build:
      context: .
      dockerfile: infra/docker/client-api.Dockerfile
    container_name: find-doctor-client-api
    environment:
      ENV: development
      DEBUG: "false"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/find-doctor
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: find-doctor
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - find-doctor-network

  # Celery Workers
  collector-worker:
    build:
      context: .
      dockerfile: infra/docker/collector.Dockerfile
    container_name: find-doctor-collector-worker
    command: celery -A collector.worker.celery_app worker --loglevel=info --concurrency=4 -Q scraper.http,scraper.browser
    environment:
      ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/find-doctor
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: db+postgresql://postgres:postgres@postgres:5432/find-doctor
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: find-doctor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - find-doctor-network

  ai-agent-worker:
    build:
      context: .
      dockerfile: infra/docker/collector.Dockerfile
    container_name: find-doctor-ai-agent-worker
    command: celery -A collector.worker.celery_app worker --loglevel=info --concurrency=2 -Q scraper.ai_agent
    environment:
      ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/find-doctor
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: db+postgresql://postgres:postgres@postgres:5432/find-doctor
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: find-doctor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - find-doctor-network

  flower:
    build:
      context: .
      dockerfile: infra/docker/collector.Dockerfile
    container_name: find-doctor-flower
    command: celery -A collector.worker.celery_app flower --port=5555
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: db+postgresql://postgres:postgres@postgres:5432/find-doctor
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/find-doctor
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - find-doctor-network

volumes:
  postgres_data:
  minio_data:

networks:
  find-doctor-network:
    driver: bridge
